<!DOCTYPE html>
<html lang="ko">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JNEB6PTY98"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', 'G-JNEB6PTY98');
</script>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할 일 목록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/settings.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/i18n.js"></script>
</head>

<body>
  <div class="noise"></div>

  <!-- 로그인 화면 -->
  <div id="auth-screen">
    <div class="auth-logo"><span id="auth-logo-text">할 일 목록</span></div>
    <p class="auth-sub" id="auth-sub-text">로그인하면 어떤 기기에서든 동기화됩니다</p>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')" id="tab-login">로그인</button>
        <button class="auth-tab" onclick="switchTab('signup')" id="tab-signup">회원가입</button>
      </div>
      <input class="auth-input" id="email-input" type="email" placeholder="이메일" />
      <input class="auth-input" id="pw-input" type="password" placeholder="비밀번호" />
      <input class="auth-input" id="pw-confirm" type="password" placeholder="비밀번호 확인" style="display:none;" />
      <button class="auth-btn" id="email-btn" onclick="emailAuth()">로그인</button>
      <p class="auth-error" id="auth-error"></p>
      <!-- 또는 -->
      <div class="auth-divider" id="or-divider">또는</div>

      <button class="google-btn" onclick="googleLogin()">
        <svg class="g-icon" viewBox="0 0 48 48">
          <path fill="#EA4335"
            d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.7 2.3 30.2 0 24 0 14.8 0 6.9 5.4 3 13.3l7.9 6.1C12.8 13.4 17.9 9.5 24 9.5z" />
          <path fill="#4285F4"
            d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z" />
          <path fill="#FBBC05"
            d="M10.9 28.6A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6l-7.9-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8.4-6.2z" />
          <path fill="#34A853"
            d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.2-4-13.1-9.3l-8.4 6.2C6.9 42.6 14.8 48 24 48z" />
        </svg>
        <span id="google-btn-text">Google로 계속하기</span>
      </button>
    </div>
  </div>

  <!-- 앱 화면 -->
  <div id="app-screen">
    <div class="top-bar">
      <div>
        <p class="eyebrow" id="today-str"></p>
        <h1><span id="hero-title">오늘도</span><br /><em id="hero-sub">잘 해낼 수 있어요</em></h1>
      </div>
      <div class="user-area">
        <button class="settings-btn" onclick="openSettings()" title="설정">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
        <div class="user-avatar" id="user-avatar"></div>
        <button class="logout-btn" onclick="logout()"><span id="logout-btn-text">로그아웃</span></button>
      </div>
    </div>

    <div class="input-card">
      <div class="input-top">
        <input class="main-input" id="todo-input" type="text" placeholder="새로운 할 일을 입력하세요..." />
        <button class="add-btn" onclick="addTodo()"><span id="add-btn-text">추가</span></button>
      </div>
      <div class="input-meta">
        <span class="meta-label" id="deadline-label">마감일</span>
        <input type="date" class="date-picker" id="new-date" />
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-lbl" id="stat-lbl-total">전체</div>
      </div>
      <div class="stat good">
        <div class="stat-num" id="stat-done">0</div>
        <div class="stat-lbl" id="stat-lbl-done">완료</div>
      </div>
      <div class="stat danger">
        <div class="stat-num" id="stat-overdue">0</div>
        <div class="stat-lbl" id="stat-lbl-overdue">기한 초과</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progress-label-text">진행률</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" id="filter-active" onclick="setFilter('active',this)">진행 중</button>
      <button class="filter-btn" id="filter-done" onclick="setFilter('done',this)">완료</button>
      <button class="filter-btn" id="filter-today" onclick="setFilter('today',this)">오늘</button>
      <button class="filter-btn" id="filter-overdue" onclick="setFilter('overdue',this)">기한 초과</button>
    </div>

    <div class="section-title" id="section-lbl">모든 할 일</div>
    <div class="todo-list" id="todo-list">
      <div class="loading">불러오는 중...</div>
    </div>
  </div>

  <!-- 설정 모달 -->
  <div class="settings-overlay" id="settings-modal" onclick="handleOverlayClick(event)">
    <div class="settings-panel">
      <div class="settings-header">
        <span class="settings-header-title" id="settings-title">개인설정</span>
        <button class="settings-close-btn" onclick="closeSettings()"><span id="settings-close-text">닫기</span></button>
      </div>
      <div class="settings-divider"></div>
      <div class="settings-body">

        <!-- 닉네임 -->
        <div class="settings-section">
          <div class="settings-section-label" id="settings-nickname-label">닉네임</div>
          <input class="settings-input" id="settings-nickname-input" type="text" placeholder="표시될 이름을 입력하세요" />
        </div>

        <!-- 테마 -->
        <div class="settings-section">
          <div class="settings-section-label" id="settings-theme-label">테마</div>
          <div class="theme-row">
            <div class="theme-label-wrap">
              <span class="theme-icon" id="theme-icon">🌙</span>
              <span id="theme-mode-text">다크 모드</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="theme-toggle" onchange="handleThemeToggle(this)" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <!-- 알림 -->
        <div class="settings-section">
          <div class="settings-section-label" id="settings-notif-label">알림</div>
          <div class="notif-row">
            <div class="notif-left">
              <span class="notif-text" id="settings-notif-text">마감일 알림 받기</span>
              <span class="notif-status" id="notif-status"></span>
            </div>
            <!-- 허용 버튼 -->
            <button class="notif-btn" id="notif-allow-btn" onclick="requestNotifications()">허용</button>
          </div>
        </div>

        <!-- 언어 -->
        <div class="lang-row" style="flex-wrap:wrap; gap:6px;">
          <button class="lang-btn active" id="lang-ko" onclick="handleLangChange('ko')">한국어</button>
          <button class="lang-btn" id="lang-en" onclick="handleLangChange('en')">English</button>
          <button class="lang-btn" id="lang-ja" onclick="handleLangChange('ja')">日本語</button>
          <button class="lang-btn" id="lang-zh" onclick="handleLangChange('zh')">中文</button>
          <button class="lang-btn" id="lang-es" onclick="handleLangChange('es')">Español</button>
          <button class="lang-btn" id="lang-fr" onclick="handleLangChange('fr')">Français</button>
          <button class="lang-btn" id="lang-de" onclick="handleLangChange('de')">Deutsch</button>
        </div>

        <button class="settings-save" id="settings-save-btn" onclick="saveSettings()">저장</button>
      </div>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
